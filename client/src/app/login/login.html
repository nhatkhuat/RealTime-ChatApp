<form #userForm="ngForm" (ngSubmit)="login()" class="md:flex justify-center px-20 bg-white gap-10 min-h-screen w-full">
    <div class="h-auto w-3/5" style="background-image: url('register.svg'); background-repeat: no-repeat; background-size: contain;
    background-position: bottom; background-color: white;">
    </div>
    <div class="bg-white my-10 rounded w-1/4 flex flex-col gap-3 shadow-sm drop-shadow-md">
        <div class="text-center mt-10">
            <i class="material-icons text-10xl text-blue-800">person</i>
            <div class="text-2xl my-2 font-medium">
                Login
            </div>
        </div>
        <div class="w-full px-4">
            <mat-form-field class="w-full" appearance="fill">
                <mat-label>Email</mat-label>
                <input matInput required #emailModel="ngModel" name="email" [(ngModel)]="email" placeholder="Email" />
                @if (emailModel.errors?.['required']) {
                <mat-error>Email is required</mat-error>
                }
            </mat-form-field>

            <mat-form-field class="w-full" appearance="fill">
                <mat-label>Password</mat-label>
                <input matInput required #passwordModel="ngModel" name="password" [(ngModel)]="password"
                    placeholder="Password" [type]="hide()?'text':'password'" />
                @if (passwordModel.errors?.['required']) {
                <mat-error>Password is required</mat-error>
                }
                <mat-icon matSuffix (click)="togglePassword($event)">
                    {{ hide() ? 'visibility_off' : 'visibility' }}
                </mat-icon>
            </mat-form-field>

            <button type="submit" [disabled]="!userForm.valid"
                class="w-full mb-5 bg-blue-500 hover:bg-blue-600 text-white rounded-md p-2 disabled:opacity-30">
                Login
            </button>
            <p class="font-bold text-xs text-center text-gray-500 pb-10">
                Don't have an account? <a [routerLink]="'/register'" class="text-blue-500 hover:underline">Register</a>
            </p>
        </div>
    </div>
</form>
