@if(chatService.currentOpenedChat())
{
<div class="p-3">
    <div class="flex flex-col text-center items-center mt-3">
        <img [src]="chatService.currentOpenedChat()?.profileImage || 'https://randomuser.me/api/portraits/men/1.jpg' "
            alt="Profile Image" class="rounded-full w-44 h-44 mb-4">

        <div class="ml-3">
            <p class="text-lg font-semibold">{{ chatService.currentOpenedChat()?.fullName | titlecase }}</p>
            <p class="text-sm text-gray-500">{{ chatService.currentOpenedChat()?.userName }}</p>
        </div>
    </div>
</div>
}
