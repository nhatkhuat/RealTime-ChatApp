@if(chatService.currentOpenedChat())
{
<div class="flex h-full min-h-0 flex-col overflow-y-auto p-5">
    <div class="rounded-3xl border border-slate-200 bg-gradient-to-b from-white to-slate-50 p-5 shadow-sm">
        <div class="flex flex-col items-center text-center">
            <img [src]="chatService.currentOpenedChat()?.profileImage || 'https://randomuser.me/api/portraits/men/1.jpg'"
                alt="Profile Image" class="mb-4 h-36 w-36 rounded-full object-cover ring-4 ring-white shadow-lg">

            <p class="text-xl font-semibold text-slate-800">{{ chatService.currentOpenedChat()?.fullName | titlecase }}
            </p>
            <p class="mt-1 text-sm text-slate-500">@{{ chatService.currentOpenedChat()?.userName }}</p>

            <div class="mt-5 flex w-full items-center justify-between rounded-2xl bg-slate-100 px-4 py-3">
                <span class="text-sm text-slate-500">Status</span>
                <span class="text-sm font-medium text-emerald-600">{{
                    chatService.status(chatService.currentOpenedChat()?.userName!) }}</span>
            </div>
        </div>
    </div>
</div>
}
