<button type="button" (click)="onButtonClick($event)" [disabled]="isDisabled() || isLoading()"
    class="w-full flex justify-center items-center mb-5 bg-blue-900 text-white rounded-md p-2 disabled:opacity-30 disabled:cursor-not-allowed">

    @if(isLoading()) {
    <div class="w-4 h-4 border-2 mr-2 border-white border-t-transparent rounded-full animate-spin"></div>
    }
    @if(isLoading()) {
    <span>Loading...</span>
    }@else {
    <span>
        {{ buttonText()}}
    </span>
    }


</button>
